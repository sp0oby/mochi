[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./" }]

remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@uniswap/v4-core/=lib/v4-core/",
  "@uniswap/v4-periphery/=lib/v4-periphery/",
  "v4-hooks-public/=lib/v4-hooks-public/src/",
  "permit2/=lib/v4-periphery/lib/permit2/",
  "solmate/=lib/v4-core/lib/solmate/"
]

[fuzz]
runs = 1000

[invariant]
runs = 256
depth = 50

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
anvil = "http://127.0.0.1:8545"

[etherscan]
# Etherscan V2 unified endpoint (replaces deprecated per-chain URLs). Same key works for
# Base + Base Sepolia + every other chain on the V2 explorer. Get a free key at
# https://etherscan.io/myapikey. The ?chainid=... query param is REQUIRED for V2.
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api.etherscan.io/v2/api?chainid=84532" }
base = { key = "${ETHERSCAN_API_KEY}", chain = 8453, url = "https://api.etherscan.io/v2/api?chainid=8453" }
