<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>mochi.garden</title>

  <!-- soft ground shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="2.4" fill="#2e3a2c" opacity="0.18"/>

  <!-- a tiny sakura sprig behind the head, peeking up -->
  <g transform="translate(48 18) rotate(18)">
    <path d="M0 0 C -5 -3, -5 -9, 0 -12 C 5 -9, 5 -3, 0 0 Z"
          fill="#a8c489" stroke="#2e3a2c" stroke-width="1.4"/>
  </g>

  <!-- character: small gardener chibi -->
  <g transform="translate(0 -1)">
    <!-- hair (bob) under the hat brim -->
    <path d="M16 26 Q16 17 32 14 Q48 17 48 26 L48 32 Q42 30 32 30 Q22 30 16 32 Z"
          fill="#6b4a3a" stroke="#2e3a2c" stroke-width="1.8"/>

    <!-- head -->
    <ellipse cx="32" cy="28" rx="13" ry="12"
             fill="#f8e8d4" stroke="#2e3a2c" stroke-width="1.8"/>

    <!-- side hair tufts -->
    <path d="M19 28 Q18 33 21 36 L23 34 Z" fill="#6b4a3a" stroke="#2e3a2c" stroke-width="1.4"/>
    <path d="M45 28 Q46 33 43 36 L41 34 Z" fill="#6b4a3a" stroke="#2e3a2c" stroke-width="1.4"/>

    <!-- straw sun-hat brim (echoes mochi-chan continuity) -->
    <ellipse cx="32" cy="19" rx="18" ry="3.4"
             fill="#d9a667" stroke="#2e3a2c" stroke-width="1.8"/>
    <!-- hat crown -->
    <ellipse cx="32" cy="15" rx="10" ry="5"
             fill="#e8be83" stroke="#2e3a2c" stroke-width="1.8"/>
    <!-- sakura band -->
    <rect x="22" y="17" width="20" height="2.2" fill="#d97a8d"/>
    <circle cx="40" cy="18" r="1.4" fill="#f4c0cc" stroke="#2e3a2c" stroke-width="0.8"/>

    <!-- cheeks -->
    <ellipse cx="25" cy="32" rx="2.2" ry="1.4" fill="#f4c0cc" opacity="0.9"/>
    <ellipse cx="39" cy="32" rx="2.2" ry="1.4" fill="#f4c0cc" opacity="0.9"/>

    <!-- eyes -->
    <ellipse cx="27" cy="29" rx="1.4" ry="2" fill="#2e3a2c"/>
    <ellipse cx="37" cy="29" rx="1.4" ry="2" fill="#2e3a2c"/>
    <circle cx="26.6" cy="28.4" r="0.5" fill="#fff"/>
    <circle cx="36.6" cy="28.4" r="0.5" fill="#fff"/>

    <!-- tiny smile -->
    <path d="M30 35 Q32 37 34 35" stroke="#2e3a2c" stroke-width="1.4"
          fill="none" stroke-linecap="round"/>

    <!-- body: overalls -->
    <path d="M22 40 Q22 38 24 38 L40 38 Q42 38 42 40 L43 52 Q43 55 40 55 L24 55 Q21 55 21 52 Z"
          fill="#bccab2" stroke="#2e3a2c" stroke-width="1.8"/>
    <!-- overall straps -->
    <rect x="25" y="38" width="2" height="5" fill="#a8c489" stroke="#2e3a2c" stroke-width="0.6"/>
    <rect x="37" y="38" width="2" height="5" fill="#a8c489" stroke="#2e3a2c" stroke-width="0.6"/>
    <!-- overall button -->
    <circle cx="32" cy="44" r="1.1" fill="#e8c34a" stroke="#2e3a2c" stroke-width="0.6"/>

    <!-- left arm holding watering can -->
    <path d="M22 42 Q17 46 14 50" stroke="#2e3a2c" stroke-width="1.8"
          fill="none" stroke-linecap="round"/>

    <!-- right arm at side -->
    <path d="M42 42 Q46 46 45 52" stroke="#2e3a2c" stroke-width="1.8"
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- watering can — the signature accessory -->
  <g transform="translate(4 44)">
    <!-- body -->
    <rect x="0" y="3" width="11" height="9" rx="1.4"
          fill="#f4c0cc" stroke="#2e3a2c" stroke-width="1.6"/>
    <!-- spout -->
    <path d="M11 5 L 16 3 L 16 7 L 11 8 Z"
          fill="#f4c0cc" stroke="#2e3a2c" stroke-width="1.4"/>
    <!-- handle -->
    <path d="M2 3 Q5 -1 9 3" stroke="#2e3a2c" stroke-width="1.4" fill="none"/>
    <!-- water drops -->
    <circle cx="17.5" cy="2" r="0.9" fill="#8aa07d"/>
    <circle cx="19" cy="5" r="0.7" fill="#8aa07d"/>
  </g>

  <!-- corner sparkles -->
  <text x="52" y="14" font-size="9" fill="#d97a8d"
        font-family="'Yusei Magic', system-ui">✿</text>
  <text x="6"  y="14" font-size="7" fill="#e8c34a"
        font-family="'Yusei Magic', system-ui">✦</text>
</svg>
